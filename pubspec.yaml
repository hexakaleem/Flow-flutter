name: flow_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.3.0
  flutter_svg: ^2.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  http: ^1.2.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_padded.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/launcher_padded.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/map.png
